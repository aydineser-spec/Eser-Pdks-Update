name: Belge Tarayıcı APK Derle

on:
  push:
    branches:
      - "claude/document-scanner-apk-u6v5oc"
    paths:
      - "belge-tarayici/**"
      - ".github/workflows/belge-tarayici-apk.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: belge-tarayici

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: JDK 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Android SDK kur
        uses: android-actions/setup-android@v3

      - name: Gerekli SDK bileşenlerini yükle
        run: |
          yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" || true

      - name: gradlew çalıştırılabilir yap
        run: chmod +x ./gradlew

      - name: Debug APK derle
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: APK'yı yeniden adlandır
        run: |
          mkdir -p ../out
          cp app/build/outputs/apk/debug/app-debug.apk ../out/BelgeTarayici.apk
          ls -la ../out

      - name: APK'yı iş çıktısı (artifact) olarak yükle
        uses: actions/upload-artifact@v4
        with:
          name: BelgeTarayici-APK
          path: out/BelgeTarayici.apk
          if-no-files-found: error

      - name: APK'yı Release olarak yayınla
        uses: softprops/action-gh-release@v2
        with:
          tag_name: belge-tarayici-latest
          name: Belge Tarayıcı (son sürüm)
          body: |
            Telefona kurulabilir hazır APK. İndir, aç ve "bilinmeyen kaynaklara izin ver" deyip kur.
          files: out/BelgeTarayici.apk
          fail_on_unmatched_files: true
